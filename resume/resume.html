<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Avery Ember Day — Resume</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Barlow:ital,wght@0,400;0,600;0,700;0,900;1,400;1,700&family=Barlow+Condensed:wght@700;900&display=swap');
  /* ─── Brand Tokens ─────────────────────────────────────────────── */
  :root {
    --pink:    #FF0099;
    --teal:    #37A7B6;
    --orange:  #FA9176;
    --purple:  #7F3F98;
    --black:   #000000;
    --dgray:   #1a1a1a;
    --mgray:   #2e2e2e;
    --lgray:   #999999;
    --white:   #FFFFFF;
    --font-display: 'Barlow Condensed', sans-serif;
    --font-body:    'Barlow', sans-serif;
  }

  /* ─── Reset ─────────────────────────────────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  /* ─── Page Shell ─────────────────────────────────────────────────── */
  html, body {
    background: var(--dgray);
    font-family: var(--font-body);
    color: var(--white);
    min-height: 100vh;
  }
  body {
    padding-top: 70px;   /* clearance for fixed controls bar; prevents top margin collapse */
    padding-bottom: 40px; /* breathing room below resume; prevents bottom margin collapse */
  }

  /* ─── Controls bar ───────────────────────────────────────────────── */
  #controls {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    background: rgba(0,0,0,0.92);
    border-bottom: 1px solid var(--teal);
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 24px;
    backdrop-filter: blur(8px);
  }
  /* ─── Skip Navigation Link ──────────────────────────────────────── */
  .skip-link {
    position: fixed;
    top: -48px;
    left: 0;
    background: var(--teal);
    color: var(--black);
    padding: 8px 18px;
    font-family: var(--font-display);
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-decoration: none;
    z-index: 200;
    transition: top 0.2s;
  }
  .skip-link:focus { top: 0; }

  /* ─── Focus styles ───────────────────────────────────────────────── */
  a:focus-visible,
  button:focus-visible,
  textarea:focus-visible {
    outline: 2px solid var(--teal);
    outline-offset: 3px;
    border-radius: 2px;
  }

  #controls .controls-label {
    font-family: var(--font-display);
    font-size: 11px;
    letter-spacing: 0.12em;
    color: var(--teal);
    text-transform: uppercase;
  }
  .ctrl-btn {
    font-family: var(--font-display);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 6px 16px;
    border: none;
    border-radius: 2px;
    cursor: pointer;
    transition: all 0.15s;
  }
  #btn-edit   { background: var(--teal);   color: var(--black); }
  #btn-print  { background: var(--pink);   color: var(--white); }
  #btn-save   { background: var(--orange); color: var(--black); display: none; }
  #btn-cancel { background: var(--mgray);  color: var(--white); display: none; }
  .ctrl-btn:hover { filter: brightness(1.15); }

  /* ─── Page container (A4-ish) ────────────────────────────────────── */
  #resume-wrap {
    margin: 0 auto;
    width: 860px;
    max-width: 98vw;
    background: var(--black);
    position: relative;
    overflow: hidden;
    box-shadow: 0 0 60px rgba(55,167,182,0.18), 0 0 100px rgba(250,145,118,0.08);
  }

  /* ─── Geometric decorations ──────────────────────────────────────── */
  .geo {
    position: absolute;
    pointer-events: none;
    z-index: 0;
  }
  /* top-right circle arc */
  .geo-circle-tr {
    top: -60px; right: -60px;
    width: 220px; height: 220px;
    border: 3px solid var(--teal);
    border-radius: 50%;
    opacity: 0.30;
  }
  /* bottom-left right triangle (90° at bottom-right, points top-left) */
  .geo-tri-bl {
    bottom: 0; left: 0;
    width: 0; height: 0;
    border-bottom: 110px solid var(--teal);
    border-right: 110px solid transparent;
    opacity: 0.28;
  }
  /* top-right right triangle (90° at top-left, points bottom-right) */
  .geo-tri-tr {
    top: 0; right: 0;
    width: 0; height: 0;
    border-top: 90px solid var(--pink);
    border-left: 90px solid transparent;
    opacity: 0.32;
  }
  /* small right triangle accent — bottom right */
  .geo-tri-br {
    bottom: 0; right: 0;
    width: 0; height: 0;
    border-bottom: 48px solid var(--orange);
    border-left: 48px solid transparent;
    opacity: 0.35;
  }
  /* accent line top */
  .geo-line-top {
    top: 0; left: 0; right: 0; height: 3px;
    background: linear-gradient(90deg, var(--teal), var(--orange), var(--pink));
  }

  /* ─── Header ─────────────────────────────────────────────────────── */
  #resume-header {
    position: relative;
    z-index: 1;
    padding: 18px 36px 14px;
    display: grid;
    grid-template-columns: auto 1fr;
    gap: 0 32px;
    align-items: center;
    border-bottom: 1px solid var(--mgray);
  }

  /* Real AED logo mark */
  .logo-mark {
    display: flex;
    align-items: center;
  }

  .header-name {
    font-family: var(--font-display);
    font-weight: 900;
    font-size: 34px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    line-height: 1;
    color: var(--white);
  }
  .header-name span { color: var(--pink); }

  .header-title {
    font-family: var(--font-display);
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--teal);
    margin-top: 4px;
    border-bottom: 1px solid rgba(255,0,153,0.25);
    display: inline-block;
    padding-bottom: 2px;
  }

  .header-contact {
    margin-top: 6px;
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
  }
  .header-contact a, .header-contact span {
    font-size: 10px;
    color: var(--lgray);
    text-decoration: none;
    letter-spacing: 0.04em;
    transition: color 0.2s;
  }
  .header-contact a:hover { color: var(--pink); }
  .header-contact .sep { color: var(--mgray); user-select: none; }

  /* ─── Body layout ────────────────────────────────────────────────── */
  #resume-body {
    position: relative;
    z-index: 1;
    display: grid;
    grid-template-columns: 1fr 260px;
  }

  /* ─── Main column ────────────────────────────────────────────────── */
  #col-main {
    padding: 16px 28px 20px 36px;
    border-right: 1px solid var(--mgray);
  }

  /* ─── Side column ────────────────────────────────────────────────── */
  #col-side {
    padding: 16px 20px 20px;
    background: #0a0a0a;
  }

  /* ─── Section ────────────────────────────────────────────────────── */
  .r-section {
    margin-bottom: 16px;
  }
  .r-section:last-child { margin-bottom: 0; }

  .section-label {
    font-family: var(--font-display);
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--teal);
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 5px;
  }
  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, var(--teal) 0%, transparent 100%);
    opacity: 0.4;
  }

  /* ─── Summary ─────────────────────────────────────────────────────── */
  .summary-text {
    font-size: 11px;
    line-height: 1.5;
    color: #c8c8c8;
  }

  /* ─── Job block ──────────────────────────────────────────────────── */
  .job {
    margin-bottom: 12px;
    padding-bottom: 12px;
    border-bottom: 1px solid #1c1c1c;
  }
  .job:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }

  .job-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 8px;
    margin-bottom: 2px;
  }
  .job-title {
    font-family: var(--font-display);
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.03em;
    color: var(--white);
    text-transform: uppercase;
  }
  .job-date {
    font-size: 10px;
    color: var(--teal);
    letter-spacing: 0.08em;
    white-space: nowrap;
    font-weight: 600;
  }
  .job-company {
    font-size: 11px;
    color: var(--orange);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .job-bullets {
    list-style: none;
    padding: 0;
  }
  .job-bullets li {
    font-size: 10.5px;
    line-height: 1.4;
    color: #b8b8b8;
    padding-left: 14px;
    position: relative;
    margin-bottom: 2px;
  }
  .job-bullets li::before {
    content: '▸';
    position: absolute;
    left: 0;
    color: var(--teal);
    font-size: 9px;
    top: 2px;
  }

  /* ─── Skills (side) ──────────────────────────────────────────────── */
  .skill-group {
    margin-bottom: 9px;
  }
  .skill-group-label {
    font-size: 9.5px;
    font-weight: 700;
    letter-spacing: 0.13em;
    text-transform: uppercase;
    color: var(--teal);
    margin-bottom: 4px;
  }
  .skill-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
  }
  .skill-tag {
    font-size: 9.5px;
    letter-spacing: 0.04em;
    padding: 2px 7px;
    border: 1px solid var(--mgray);
    border-radius: 2px;
    color: var(--lgray);
    background: #111;
  }
  .skill-tag.highlight {
    border-color: var(--orange);
    color: var(--orange);
    background: rgba(250,145,118,0.08);
  }

  /* ─── Education (side) ───────────────────────────────────────────── */
  .edu-degree {
    font-family: var(--font-display);
    font-size: 13px;
    font-weight: 700;
    color: var(--white);
    text-transform: uppercase;
    letter-spacing: 0.03em;
    line-height: 1.2;
  }
  .edu-school {
    font-size: 11px;
    color: var(--orange);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin: 3px 0 2px;
  }
  .edu-date {
    font-size: 10px;
    color: var(--lgray);
    letter-spacing: 0.06em;
  }
  .edu-note {
    font-size: 10px;
    color: #888;
    line-height: 1.45;
    margin-top: 4px;
  }

  /* ─── Awards ────────────────────────────────────────────────────── */
  .award-item {
    display: flex;
    gap: 10px;
    align-items: baseline;
    margin-bottom: 6px;
    font-size: 10.5px;
    line-height: 1.45;
    color: #c0c0c0;
  }
  .award-bullet {
    color: var(--orange);
    font-size: 9px;
    flex-shrink: 0;
    margin-top: 2px;
  }
  .award-item strong { color: var(--white); }

  /* ─── Testimonial ────────────────────────────────────────────────── */
  .testimonial-box {
    background: linear-gradient(135deg, rgba(255,0,153,0.05), rgba(55,167,182,0.05));
    border-left: 2px solid var(--teal);
    padding: 9px 12px;
    border-radius: 0 2px 2px 0;
    position: relative;
  }
  .testimonial-box::before {
    content: '\201C';
    font-size: 40px;
    color: var(--teal);
    opacity: 0.3;
    position: absolute;
    top: -4px; left: 8px;
    font-family: Georgia, serif;
    line-height: 1;
  }
  .testimonial-text {
    font-size: 10px;
    font-style: italic;
    line-height: 1.5;
    color: #c0c0c0;
    padding-left: 10px;
  }
  .testimonial-attr {
    font-size: 10px;
    color: var(--teal);
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-top: 8px;
    padding-left: 10px;
  }

  /* ─── Links (side) ───────────────────────────────────────────────── */
  .profile-link {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 5px;
    font-size: 10.5px;
    color: var(--lgray);
    text-decoration: none;
    transition: color 0.2s;
  }
  .profile-link:hover { color: var(--teal); }
  .profile-link .link-dot {
    width: 5px; height: 5px;
    background: var(--teal);
    border-radius: 50%;
    flex-shrink: 0;
  }

  /* ─── Edit textarea ──────────────────────────────────────────────── */
  #edit-panel {
    display: none;
    flex-direction: column;
    position: fixed;
    inset: 56px 0 0 0;
    z-index: 50;
    background: rgba(0,0,0,0.97);
    padding: 20px 24px;
    overflow: auto;
  }
  #edit-textarea {
    flex: 1;
    min-height: 0;
    width: 100%;
    background: #111;
    color: #e0e0e0;
    border: 1px solid var(--teal);
    font-family: 'Courier New', monospace;
    font-size: 13px;
    line-height: 1.6;
    padding: 16px;
    border-radius: 4px;
    resize: none;
  }
  #edit-textarea:focus { border-color: var(--teal); }
  .edit-hint {
    font-size: 11px;
    color: var(--lgray);
    margin-bottom: 8px;
    letter-spacing: 0.04em;
  }

  /* ─── Print ──────────────────────────────────────────────────────── */
  @page { size: letter portrait; margin: 0; }
  @media print {
    html, body { background: #000; margin: 0; padding: 0; }
    #controls, #edit-panel, .skip-link { display: none !important; }
    #resume-wrap {
      margin: 0 !important;
      width: 100% !important;
      max-width: 100% !important;
      box-shadow: none;
      background: #000;
      page-break-after: avoid;
    }
    #col-main, #col-side { overflow: hidden; }
    .header-contact a { color: #aaa !important; }
  }
</style>
</head>
<body>

<a class="skip-link" href="#col-main">Skip to main content</a>

<!-- ── Controls ──────────────────────────────────────── -->
<div id="controls" role="toolbar" aria-label="Resume controls">
  <span class="controls-label" aria-hidden="true">AED Resume</span>
  <div style="flex:1"></div>
  <button class="ctrl-btn" id="btn-edit"   aria-label="Edit resume content"  onclick="openEdit()">✏ Edit Content</button>
  <button class="ctrl-btn" id="btn-save"   aria-label="Apply changes"        onclick="saveEdit()">✓ Apply</button>
  <button class="ctrl-btn" id="btn-cancel" aria-label="Cancel editing"       onclick="cancelEdit()">✕ Cancel</button>
  <button class="ctrl-btn" id="btn-print"  aria-label="Print or save as PDF" onclick="window.print()">⬇ Print / PDF</button>
</div>

<!-- ── Edit Panel ─────────────────────────────────────────── -->
<div id="edit-panel" role="dialog" aria-modal="true" aria-labelledby="edit-panel-title" aria-describedby="edit-hint">
  <p id="edit-panel-title" class="edit-hint" style="font-weight:700;color:var(--white);margin-bottom:4px">Edit Resume Content</p>
  <p id="edit-hint" class="edit-hint">Edit the markdown below, then click Apply to update the resume.</p>
  <textarea id="edit-textarea" aria-label="Resume markdown content" aria-describedby="edit-hint"></textarea>
</div>

  <div class="geo geo-tri-tr"     aria-hidden="true"></div>

let currentMd = localStorage.getItem('aed_resume_md') || DEFAULT_MD;

// ─── Parse & Render ─────────────────────────────────────────────────
function render(md) {
  const tokens = marked.lexer(md);

  let mainHtml = '';
  let sideHtml = '';
  let section  = '';

  // Job state
  let inJob = false, jobTitle = '', jobCompany = '', jobDate = '';
  let jobBullets = [];

  // Education state
  let inEduBlock = false, eduDeg = '', eduSchool = '', eduDate = '', eduNote = '';

  // Section accumulators / flags
  let skillLines = [], testimonialLines = [], profileLines = [];
  let inSummary = false, inSkills = false, inTest = false;
  let inProfiles = false, inAwards = false, inEduSection = false;

  const SIDE_SECTIONS = ['SKILLS', 'TESTIMONIAL', 'PORTFOLIO & PROFILES'];

  const SECTION_LABELS = {
    'SUMMARY':              'Summary',
    'EXPERIENCE':           'Experience',
    'SKILLS':               'Skills',
    'EDUCATION':            'Education',
    'AWARDS & RECOGNITION': 'Awards & Recognition',
    'TESTIMONIAL':          'Testimonial',
    'PORTFOLIO & PROFILES': 'Profiles'
  };

  // Route HTML to the correct column
  function addTo(col, html) {
    if (col === 'side') sideHtml += html; else mainHtml += html;
  }
  function emit(html) {
    addTo(SIDE_SECTIONS.includes(section) ? 'side' : 'main', html);
  }

  // Inline markdown → HTML via marked
  function ip(text) { return marked.parseInline(text); }

  function flushJob() {
    if (!jobTitle) return;
    mainHtml += `<div class="job">
      <div class="job-header">
        <div class="job-title">${jobTitle}</div>
        <div class="job-date">${jobDate}</div>
      </div>
      <div class="job-company">${jobCompany}</div>
      <ul class="job-bullets">${jobBullets.map(b => `<li>${b}</li>`).join('')}</ul>
    </div>`;
    jobTitle = ''; jobCompany = ''; jobDate = ''; jobBullets = [];
    inJob = false;
  }

  function flushEdu() {
    if (!eduDeg) return;
    mainHtml += `<div>
      <div class="edu-degree">${eduDeg}</div>
      <div class="edu-school">${eduSchool}</div>
      <div class="edu-date">${eduDate}</div>
      ${eduNote ? `<div class="edu-note">${eduNote}</div>` : ''}
    </div>`;
    eduDeg = ''; eduSchool = ''; eduDate = ''; eduNote = '';
    inEduBlock = false;
  }

  function closeSection() {
    flushJob();
    flushEdu();
    if (inSummary)    { mainHtml  += '</div>'; inSummary = false; }
    if (inSkills)     { sideHtml  += buildSkills(skillLines) + '</div>'; skillLines = []; inSkills = false; }
    if (inAwards)     { mainHtml  += '</div>'; inAwards = false; }
    if (inEduSection) { mainHtml  += '</div>'; inEduSection = false; }
    if (inTest)       { sideHtml  += buildTestimonial(testimonialLines) + '</div>'; testimonialLines = []; inTest = false; }
    if (inProfiles)   { sideHtml  += buildProfiles(profileLines) + '</div>'; profileLines = []; inProfiles = false; }
    if (section === 'EXPERIENCE') mainHtml += '</div>';
    section = '';
  }

  for (const token of tokens) {

    // ── H2: open a new section ────────────────────────────────
    if (token.type === 'heading' && token.depth === 2) {
      closeSection();
      section = token.text.toUpperCase().trim();
      const label = SECTION_LABELS[section] || section;
      const col   = SIDE_SECTIONS.includes(section) ? 'side' : 'main';
      addTo(col, `<div class="r-section"><div class="section-label">${label}</div>`);
      if (section === 'SUMMARY')               inSummary    = true;
      if (section === 'SKILLS')                inSkills     = true;
      if (section === 'AWARDS & RECOGNITION')  inAwards     = true;
      if (section === 'EDUCATION')             inEduSection = true;
      if (section === 'TESTIMONIAL')           inTest       = true;
      if (section === 'PORTFOLIO & PROFILES')  inProfiles   = true;
      continue;
    }

    // ── H3: job or education entry title ─────────────────────
    if (token.type === 'heading' && token.depth === 3) {
      flushJob(); flushEdu();
      const title = ip(token.text);
      if (section === 'EXPERIENCE') { jobTitle = title; inJob = true; }
      if (section === 'EDUCATION')  { eduDeg   = title; inEduBlock = true; }
      continue;
    }

    // ── HR: close the current section ────────────────────────
    if (token.type === 'hr') {
      closeSection();
      continue;
    }

    // ── Paragraphs ───────────────────────────────────────────
    if (token.type === 'paragraph') {
      const raw = token.text;
      if (inSummary) {
        emit(`<p class="summary-text">${ip(raw)}</p>`);
      } else if (inJob) {
        // **Company  |  Location** | Date range
        const m = raw.match(/^\*\*(.+?)\*\*\s*\|\s*(.+)$/);
        if (m) { jobCompany = m[1]; jobDate = m[2]; }
      } else if (inEduBlock && !eduSchool) {
        // **School** | Date range  OR  plain note
        const m = raw.match(/^\*\*(.+?)\*\*\s*\|\s*(.+)$/);
        if (m) { eduSchool = m[1]; eduDate = m[2]; }
        else   { eduNote = ip(raw); }
      } else if (inEduBlock && eduSchool && !eduNote) {
        eduNote = ip(raw);
      }
      continue;
    }

    // ── Lists ────────────────────────────────────────────────
    if (token.type === 'list') {
      for (const item of token.items) {
        if (inJob)       { jobBullets.push(ip(item.text)); }
        else if (inSkills)   { skillLines.push(ip(item.text)); }
        else if (inProfiles) { profileLines.push(item.text); /* keep raw for URL extraction */ }
        else if (inAwards) {
          mainHtml += `<div class="award-item"><span class="award-bullet">▸</span><span>${ip(item.text)}</span></div>`;
        }
      }
      continue;
    }

    // ── Blockquotes (testimonial) ────────────────────────────
    if (token.type === 'blockquote' && inTest) {
      // token.text is the inner content with > markers stripped; split into lines
      (token.text || '').split('\n').filter(l => l.trim()).forEach(line => {
        testimonialLines.push(ip(line.trim()));
      });
      continue;
    }
  }

  // Flush any section still open at end-of-document
  closeSection();

  document.getElementById('main-content').innerHTML = mainHtml;
  document.getElementById('side-content').innerHTML = sideHtml;
}

function buildSkills(lines) {
  let html = '';
  lines.forEach(line => {
    // handles colon inside bold: <strong>Label:</strong> values
    // OR colon outside bold:     <strong>Label</strong>: values
    const m = line.match(/^<strong>(.+?):?<\/strong>:?\s*(.+)$/);
    if (m) {
      const label = m[1].replace(/:$/, '');
      const tags = m[2].split(',').map(t => t.trim());
      html += `<div class="skill-group">
        <div class="skill-group-label">${label}</div>
        <div class="skill-tags">${tags.map((t,i)=>`<span class="skill-tag${i<2?' highlight':''}">${t}</span>`).join('')}</div>
      </div>`;
    }
  });
  return html;
}

function buildTestimonial(lines) {
  // lines[0] is quote text, rest might be attribution
  const quote = lines[0] || '';
  const attr = lines.slice(1).join(' ').replace(/^— /, '');
  return `<div class="testimonial-box">
    <div class="testimonial-text">${quote}</div>
    ${attr ? `<div class="testimonial-attr">${attr}</div>` : ''}
  </div>`;
}

function buildProfiles(lines) {
  return lines.map(line => {
    const m = line.match(/^(.+?): (.+)$/);
    if (!m) return '';
    const label = m[1], url = m[2];
    const href = url.startsWith('http') ? url : 'https://' + url;
    return `<a class="profile-link" href="${href}" target="_blank" rel="noopener noreferrer">
      <span class="link-dot" aria-hidden="true"></span>${label}: ${url}
    </a>`;
  }).join('');
}

// ─── Edit controls ───────────────────────────────────────────────────
function openEdit() {
  editBackup = currentMd;
  document.getElementById('edit-textarea').value = currentMd;
  document.getElementById('edit-panel').style.display = 'flex';
  document.getElementById('resume-wrap').style.display = 'none';
  document.getElementById('btn-edit').style.display   = 'none';
  document.getElementById('btn-print').style.display  = 'none';
  document.getElementById('btn-save').style.display   = 'inline-block';
  document.getElementById('btn-cancel').style.display = 'inline-block';
}

function saveEdit() {
  currentMd = document.getElementById('edit-textarea').value;
  localStorage.setItem('aed_resume_md', currentMd);
  closeEditPanel();
  render(currentMd);
}

function cancelEdit() {
  currentMd = editBackup;
  closeEditPanel();
}

function closeEditPanel() {
  document.getElementById('edit-panel').style.display  = 'none';
  document.getElementById('resume-wrap').style.display = 'block';
  document.getElementById('btn-edit').style.display    = 'inline-block';
  document.getElementById('btn-print').style.display   = 'inline-block';
  document.getElementById('btn-save').style.display    = 'none';
  document.getElementById('btn-cancel').style.display  = 'none';
}

// ─── Init ────────────────────────────────────────────────────────────
render(currentMd);
</script>
